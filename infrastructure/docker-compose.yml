services:
  code-server:
    build:
      context: ./Docker/vscode
      dockerfile: Dockerfile
    container_name: vscode_container_streaming_lab
    ports:
      - 127.0.0.1:8090:8080
    volumes:
      - ./workspace:/home/coder/workspace
    environment:
      - DEFAULT_WORKSPACE=/home/coder/workspace
      - PYSPARK_DRIVER_PYTHON=python3
    networks:
      - lab-net
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: reda_zookeeper_lab
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx256m"
    mem_limit: 512m
    networks:
      - lab-net
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: reda_kafka_lab
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: INTERNAL://reda_kafka_lab:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://reda_kafka_lab:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
    mem_limit: 1g
    networks:
      - lab-net
      
  neo4j:
    image: neo4j:5
    container_name: reda_neo4j_lab
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/test1234
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_server_memory_heap_initial__size=256M
      - NEO4J_server_memory_heap_max__size=512M
      - NEO4J_server_memory_pagecache_size=256M
    volumes:
      - neo4j_data:/data
    mem_limit: 1g
    networks:
      - lab-net

   
  postgres:
    image: ankane/pgvector
    container_name: pgvector_snoql_lab
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vectordb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - lab-net
      
volumes:
  postgres_data:
  neo4j_data:
  pgdata:

networks:
  lab-net:
    driver: bridge
